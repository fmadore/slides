<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talk title — Frédérick Madore</title>
  <link rel="icon" href="../../shared/logo-africamultiple.png">
  <link rel="stylesheet" href="../../shared/reveal/reset.css">
  <link rel="stylesheet" href="../../shared/reveal/reveal.css">
  <link rel="stylesheet" href="../../shared/theme.css">
</head>
<body>

<!-- ============================================================================
     NEW TALK CHECKLIST
     1. Copy this folder:  talks/_template  →  talks/YYYY-MM-DD-place-short-title
     2. Edit DECK_CONFIG below, then the slides.
     3. Add an entry to the TALKS array in /index.html (the landing page).
     Full layout catalogue + shortcuts: see /README.md.

     AUTHORING IN MARKDOWN
     • Most slides are written in Markdown: a <section data-markdown> wrapping a
       <textarea data-template>. Write the body in plain Markdown.
     • Slide-level attributes (layout class, data-toc, data-footer) go on the
       <section> tag, exactly like an HTML slide.
     • To put a theme class on a Markdown element, put an element-comment on its
       own line directly below it (binds reliably even when the line has inline
       links/emphasis/spans). The standard-content slide below shows the exact
       ".element: class=..." comment syntax.
     • Speaker notes: a line starting with `Note:` — everything after it becomes
       the note (press S for the speaker view).
     • Keep the body indented consistently; the first content line sets the
       baseline indent that the plugin strips. Leave blank lines truly empty.
     • Need a richer layout (two columns, panels, code, media)? Just write a
       plain HTML <section> instead — Markdown and HTML slides mix freely.
     ============================================================================ -->
<script>
  window.DECK_CONFIG = {
    presenter: "Frédérick Madore",
    talkTitle: "Talk title",
    talkShort: "Talk title",                 // footer label — keep it short
    venue:     "Venue · DD Month YYYY",
    tocEyebrow:"Outline",
    transition:"fade",
    links: {
      github:  "https://github.com/fmadore",
      website: "https://www.frederickmadore.com/",
      orcid:   "https://orcid.org/0000-0003-0959-2092",
      linkedin:"https://www.linkedin.com/in/frederickmadore/",
      email:   "frederick.madore@uni-bayreuth.de"
    }
  };
</script>

<div class="reveal">
  <div class="slides">

    <!-- COVER (Markdown) -->
    <section class="cover" data-footer="light" data-markdown>
      <textarea data-template>
        Event · Place, DD Month YYYY
        <!-- .element: class="eyebrow" -->

        # Talk title

        A one-line description of the talk.
        <!-- .element: class="subtitle" -->

        <div class="byline">
          <span class="name">Frédérick Madore</span>
          <span class="affil">Africa Multiple Cluster of Excellence</span>
        </div>
        <div data-contact></div>
        <img class="org-logo" src="../../shared/logo-bayreuth.svg" alt="University of Bayreuth">
        <!-- QR to these slides. Replace assets/qr-slides.png with a code for THIS
             talk's live URL and update the label; delete this block to omit it. -->
        <div class="slides-qr">
          <img src="assets/qr-slides.png" alt="QR code linking to these slides online">
          <span class="qr-label"><b>Scan for these slides</b><span class="qr-url">fmadore.github.io/slides</span></span>
        </div>

        Note: Speaker notes for the cover — press **S** for the speaker view.
      </textarea>
    </section>

    <!-- SECTION DIVIDER (Markdown · add `green` to the class for the green variant) -->
    <section class="section" data-toc="First section" data-markdown>
      <textarea data-template>
        01
        <!-- .element: class="sec-no" -->

        ## The first section

        An optional italic subtitle.
        <!-- .element: class="sec-sub" -->
      </textarea>
    </section>

    <!-- STANDARD CONTENT (Markdown · the everyday slide) -->
    <section data-toc="A key point" data-markdown>
      <textarea data-template>
        Optional eyebrow
        <!-- .element: class="kicker" -->

        ## A slide title
        <!-- .element: class="slide-title" -->

        A larger opening line that sets up the slide.
        <!-- .element: class="lead" -->

        - First point
        - Second point, with an **emphasis** and a <span class="hl">highlight</span>
        - Third point

        Note: Everything after `Note:` becomes speaker notes.
      </textarea>
    </section>

    <!-- TWO COLUMNS (HTML) — for richer layouts, write a plain HTML section.
         Markdown and HTML slides can be mixed freely in the same deck.
         Tip: add class="balance" to a sparse <section> to vertically centre its
         content (by default content sits at the top of the slide). -->
    <section>
      <h2 class="slide-title no-rule">A comparison</h2>
      <div class="cols">
        <div class="col"><div class="col-head">Left</div><ul><li>…</li></ul></div>
        <div class="col"><div class="col-head alt">Right</div><ul><li>…</li></ul></div>
      </div>
    </section>

    <!-- BIG STATEMENT (Markdown · add `quote` to the class for the quote variant) -->
    <section class="statement" data-footer="light" data-markdown>
      <textarea data-template>
        A claim worth pausing on, with one <span class="accent">emphasised phrase.</span>
        <!-- .element: class="statement-body" -->

        A supporting line beneath it.
        <!-- .element: class="attribution" -->
      </textarea>
    </section>

    <!-- CLOSING / CONTACT (Markdown) -->
    <section class="closing" data-footer="dark" data-markdown>
      <textarea data-template>
        Thank you · Merci
        <!-- .element: class="kicker" -->

        ## A closing line.

        <div class="byline"><span class="name">Frédérick Madore</span><span class="affil">Africa Multiple Cluster of Excellence</span></div>
        <div data-contact></div>
        <img class="org-logo" src="../../shared/logo-bayreuth.svg" alt="University of Bayreuth">
        <!-- QR to these slides (floats to the top-right corner). Replace the PNG + label. -->
        <div class="slides-qr corner">
          <img src="assets/qr-slides.png" alt="QR code linking to these slides online">
          <span class="qr-label"><b>Scan for these slides</b><span class="qr-url">fmadore.github.io/slides</span></span>
        </div>
      </textarea>
    </section>

  </div>
</div>

<!-- reveal.js + plugins (vendored), then the deck engine. Order matters:
     markdown converts [data-markdown] sections before the rest run. -->
<script src="../../shared/reveal/reveal.js"></script>
<script src="../../shared/reveal/plugin/markdown.js"></script>
<script src="../../shared/reveal/plugin/highlight.js"></script>
<script src="../../shared/reveal/plugin/notes.js"></script>
<script src="../../shared/reveal/plugin/zoom.js"></script>
<script src="../../shared/reveal/plugin/search.js"></script>
<script src="../../shared/deck.js"></script>

</body>
</html>
