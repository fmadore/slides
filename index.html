<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frédérick Madore — Talks &amp; Slides</title>
  <meta name="description" content="Slides from talks by Frédérick Madore on Islam in West Africa, digital humanities, and the Islam West Africa Collection.">
  <link rel="icon" href="shared/logo-africamultiple.png">
  <style>
    @import "shared/fonts/fonts.css";

    :root {
      --green:#009260; --navy:#00268a; --gold:#cca352; --sky:#44b8f2; --brown:#d57912; --amber:#f59c08;
      --green-deep: color-mix(in oklch, var(--green), #0a1812 28%);
      --navy-deep:  color-mix(in oklch, var(--navy), #05060f 22%);
      --paper: oklch(0.984 0.007 92);
      --panel: oklch(0.996 0.003 92);
      --ink:   oklch(0.252 0.021 258);
      --ink-soft: oklch(0.448 0.024 258);
      --line:  oklch(0.90 0.011 90);
      --serif: "Literata","Iowan Old Style",Georgia,"Times New Roman",serif;
      --sans:  "Hanken Grotesk",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      --maxw: 60rem;
      --ease: cubic-bezier(0.22,1,0.36,1);
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; background: var(--paper); color: var(--ink);
      font-family: var(--sans); line-height: 1.6;
      font-feature-settings: "kern","liga"; -webkit-font-smoothing: antialiased;
    }
    a { color: var(--green-deep); text-decoration: none; }

    /* Signature spectrum bar */
    .spectrum {
      position: fixed; inset: 0 0 auto 0; height: 4px; z-index: 10;
      background: linear-gradient(90deg,
        var(--green) 0 16.66%, var(--sky) 16.66% 33.33%, var(--navy) 33.33% 50%,
        var(--gold) 50% 66.66%, var(--brown) 66.66% 83.33%, var(--amber) 83.33% 100%);
    }

    .wrap { max-width: var(--maxw); margin: 0 auto; padding: clamp(2.5rem, 6vw, 5rem) clamp(1.4rem, 5vw, 3rem) 4rem; }

    /* Masthead */
    .masthead { margin-bottom: clamp(2.5rem, 6vw, 4rem); }
    .masthead .logo { height: 2.6rem; width: auto; margin-bottom: clamp(1.6rem, 4vw, 2.4rem); display: block; }
    .eyebrow {
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em;
      font-size: 0.82rem; color: var(--green-deep); margin: 0 0 0.7rem;
      display: inline-flex; align-items: center; gap: 0.6em;
    }
    .eyebrow::before { content:""; width: 1.7em; height: 2px; background: var(--green); border-radius: 2px; }
    h1 {
      font-family: var(--serif); font-weight: 600; letter-spacing: -0.02em;
      font-size: clamp(2.6rem, 7vw, 4.2rem); line-height: 1.04; margin: 0 0 1rem; max-width: 16ch;
    }
    .lead { font-size: clamp(1.05rem, 2.4vw, 1.3rem); color: var(--ink-soft); max-width: 46ch; margin: 0 0 1.6rem; }
    .links { display: flex; flex-wrap: wrap; gap: 0.9rem 1.5rem; }
    .links a { display: inline-flex; align-items: center; gap: 0.5em; color: var(--ink-soft); font-size: 0.95rem; font-weight: 500; transition: color 0.2s var(--ease); }
    .links a:hover { color: var(--green-deep); }
    .links a svg { width: 1.1em; height: 1.1em; }
    .links a .ico { color: var(--green-deep); display: inline-flex; }

    /* Talks list */
    .talks-head { font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; font-size: 0.82rem; color: var(--ink-soft); padding-bottom: 0.9rem; border-bottom: 2px solid var(--ink); margin-bottom: 0.5rem; }
    .talk {
      display: grid; grid-template-columns: 8.5rem 1fr auto; gap: 0.4rem 1.8rem; align-items: baseline;
      padding: 1.5rem 0.4rem; border-bottom: 1px solid var(--line);
      color: var(--ink); transition: background 0.2s var(--ease), padding-left 0.2s var(--ease);
    }
    .talk:hover { background: color-mix(in oklch, var(--green), var(--paper) 92%); padding-left: 1rem; }
    .talk-date { font-family: var(--serif); font-variant-numeric: tabular-nums; color: var(--ink-soft); font-size: 0.98rem; padding-top: 0.35rem; }
    .talk-event { font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.74rem; color: var(--green-deep); display: block; margin-bottom: 0.3rem; }
    .talk-title { font-family: var(--serif); font-size: clamp(1.35rem, 3vw, 1.75rem); font-weight: 600; line-height: 1.15; color: var(--ink); display: block; }
    .talk:hover .talk-title { color: var(--green-deep); }
    .talk-desc { color: var(--ink-soft); font-size: 0.98rem; margin-top: 0.35rem; max-width: 52ch; }
    .talk-arrow { color: var(--green); font-size: 1.4rem; align-self: center; transition: transform 0.2s var(--ease); }
    .talk:hover .talk-arrow { transform: translateX(4px); }

    .foot { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--line); color: var(--ink-soft); font-size: 0.85rem; display: flex; flex-wrap: wrap; gap: 0.5rem 1.5rem; justify-content: space-between; }
    .foot a { color: var(--ink-soft); } .foot a:hover { color: var(--green-deep); }

    @media (max-width: 600px) {
      .talk { grid-template-columns: 1fr auto; }
      .talk-date { grid-column: 1 / -1; order: -1; font-size: 0.85rem; padding-top: 0; }
    }
  </style>
</head>
<body>
  <div class="spectrum"></div>
  <div class="wrap">

    <header class="masthead">
      <img class="logo" src="shared/logo-africamultiple.png" alt="Africa Multiple — Cluster of Excellence">
      <p class="eyebrow">Talks &amp; presentations</p>
      <h1>Frédérick Madore</h1>
      <p class="lead">Slides from talks on Islam in West Africa, digital humanities, and the Islam West Africa Collection (IWAC).</p>
      <nav class="links" id="links"></nav>
    </header>

    <main>
      <p class="talks-head">Talks</p>
      <div id="talks"></div>
    </main>

    <footer class="foot">
      <span>Africa Multiple Cluster of Excellence · University of Bayreuth</span>
      <span>Built with reveal.js · <a href="https://github.com/fmadore/slides">source</a></span>
    </footer>

  </div>

  <!-- ============================================================
       To add a talk: copy talks/_template → talks/<slug>, then add
       one entry below (newest first). `slug` is the folder name.
       ============================================================ -->
  <script>
    const PROFILE = {
      github:  "https://github.com/fmadore",
      website: "https://www.frederickmadore.com/",
      orcid:   "https://orcid.org/0000-0003-0959-2092",
      email:   "frederick.madore@uni-bayreuth.de"
    };

    const TALKS = [
      {
        date:  "2026-06-15",
        event: "Eighth Conference on Digital Humanities and Digital History · C²DH, University of Luxembourg",
        title: "Beyond Keywords: AI-Mediated Access to the Islam West Africa Collection through an MCP Server and Agent Skill",
        slug:  "2026-06-15-luxembourg-beyond-keywords"
      }
    ];

    const ICON = {
      github:'<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.5 11.5 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222 0 1.606-.014 2.898-.014 3.293 0 .322.216.694.825.576C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>',
      globe:'<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9.2"/><path d="M3 12h18M12 2.8c2.6 2.6 3.9 6.2 3.9 9.2s-1.3 6.6-3.9 9.2c-2.6-2.6-3.9-6.2-3.9-9.2S9.4 5.4 12 2.8z"/></svg>',
      orcid:'<svg viewBox="0 0 256 256" aria-hidden="true"><circle cx="128" cy="128" r="128" fill="#A6CE39"/><g fill="#fff"><path d="M86.3 186.2H70.9V79.1h15.4v107.1z"/><path d="M108.9 79.1h41.6c39.6 0 57 28.3 57 53.6 0 27.5-21.5 53.6-56.8 53.6h-41.8V79.1zm15.4 93.3h24.5c34.9 0 42.9-26.5 42.9-39.7 0-21.5-13.7-39.7-43.7-39.7h-23.7v79.4z"/><circle cx="78.6" cy="56.8" r="10.1"/></g></svg>',
      mail:'<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="4.5" width="19" height="15" rx="2.2"/><path d="M3 6.5l9 6 9-6"/></svg>'
    };
    const tidy = u => u.replace(/^https?:\/\//,"").replace(/^www\./,"").replace(/\/$/,"");
    const fmtDate = iso => { const [y,m,d]=iso.split("-").map(Number); return new Date(Date.UTC(y,m-1,d)).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric",timeZone:"UTC"}); };

    document.getElementById("links").innerHTML =
      `<a href="${PROFILE.github}" target="_blank" rel="noopener"><span class="ico">${ICON.github}</span>${tidy(PROFILE.github)}</a>` +
      `<a href="${PROFILE.website}" target="_blank" rel="noopener"><span class="ico">${ICON.globe}</span>${tidy(PROFILE.website)}</a>` +
      `<a href="${PROFILE.orcid}" target="_blank" rel="noopener"><span class="ico">${ICON.orcid}</span>${tidy(PROFILE.orcid)}</a>` +
      `<a href="mailto:${PROFILE.email}"><span class="ico">${ICON.mail}</span>${PROFILE.email}</a>`;

    document.getElementById("talks").innerHTML = TALKS
      .slice().sort((a,b)=>b.date.localeCompare(a.date))
      .map(t => `<a class="talk" href="talks/${t.slug}/">
        <span class="talk-date">${fmtDate(t.date)}</span>
        <span class="talk-body">
          <span class="talk-event">${t.event}</span>
          <span class="talk-title">${t.title}</span>
          ${t.desc ? `<span class="talk-desc">${t.desc}</span>` : ""}
        </span>
        <span class="talk-arrow" aria-hidden="true">→</span>
      </a>`).join("");
  </script>
</body>
</html>
